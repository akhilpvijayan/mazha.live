<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1424"/>
      <stop offset="100%" stop-color="#070e1a"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0077bb"/>
    </linearGradient>
    <linearGradient id="drop1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0055aa" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
  <!-- Cloud -->
  <path d="M47 28a10 10 0 00-9.2-10A14 14 0 008 23a9 9 0 001 18h38a10 10 0 000-13z" fill="url(#cloud)" filter="url(#glow)" opacity="0.95"/>
  <!-- Rain drops -->
  <ellipse cx="22" cy="52" rx="2" ry="3.5" fill="url(#drop1)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,8;0,0" dur="1.1s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.1s" repeatCount="indefinite" begin="0s"/>
  </ellipse>
  <ellipse cx="32" cy="54" rx="2" ry="3.5" fill="url(#drop1)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,8;0,0" dur="1.1s" repeatCount="indefinite" begin="0.32s"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.1s" repeatCount="indefinite" begin="0.32s"/>
  </ellipse>
  <ellipse cx="42" cy="52" rx="2" ry="3.5" fill="url(#drop1)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,8;0,0" dur="1.1s" repeatCount="indefinite" begin="0.64s"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.1s" repeatCount="indefinite" begin="0.64s"/>
  </ellipse>
</svg>
